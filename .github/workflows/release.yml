name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, do not publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_TOOLCHAIN: "1.83.0"
  CARGO_REGISTRIES_GITHUB_INDEX: "sparse+https://cargo.pkg.github.com/shibuiwilliam/index/"
  CARGO_REGISTRIES_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: read
  packages: write

jobs:
  # ── Gate: run the full CI suite first ────────────────────────────────
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema pyyaml referencing

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: make clippy

      - name: Test
        run: cargo test --workspace

      - name: Schema validate
        run: make schema-validate

  # ── Build release binaries ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aaf-server dist/aaf-server-${{ matrix.target }} 2>/dev/null || true
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aaf-server-${{ matrix.target }}
          path: dist/
          if-no-files-found: warn

  # ── Build and push Docker image ─────────────────────────────────────
  docker:
    name: Docker Image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/aaf-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish crates to GitHub Packages ───────────────────────────────
  publish:
    name: Publish Crates
    needs: [ci, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates to GitHub Packages
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Crates must be published in dependency order.
          # Leaf crates first, then crates that depend on them.
          CRATES=(
            aaf-contracts
            aaf-storage
            aaf-transport
            aaf-ontology
            aaf-identity
            aaf-trace
            aaf-trust
            aaf-memory
            aaf-policy
            aaf-llm
            aaf-registry
            aaf-eval
            aaf-learn
            aaf-surface
            aaf-intent
            aaf-runtime
            aaf-planner
            aaf-saga
            aaf-sidecar
            aaf-wrapper
            aaf-federation
            aaf-server
          )

          for crate in "${CRATES[@]}"; do
            echo "::group::Publishing ${crate}"
            cargo publish \
              -p "${crate}" \
              --registry github \
              --allow-dirty \
              2>&1 || echo "⚠ ${crate} publish failed (may already exist)"
            echo "::endgroup::"
          done

  # ── Create GitHub Release ───────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
