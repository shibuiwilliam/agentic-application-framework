# AAF pre-commit configuration
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Skip hooks for a one-off commit (not recommended):
#   git commit --no-verify

repos:
  # ── General file hygiene ───────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-endings
        args: [--fix=lf]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # ── Rust formatting ────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

  # ── Rust linting ───────────────────────────────────────────────────
      - id: cargo-clippy
        name: cargo clippy
        entry: make clippy
        language: system
        types: [rust]
        pass_filenames: false

  # ── Rust tests ─────────────────────────────────────────────────────
      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

  # ── Schema validation ──────────────────────────────────────────────
      - id: schema-validate
        name: schema validate
        entry: python3 scripts/schema_validate.py --schema-dir spec/schemas --examples-dir spec/examples
        language: system
        files: ^spec/
        pass_filenames: false

  # ── Ontology lint ──────────────────────────────────────────────────
      - id: ontology-lint
        name: ontology lint
        entry: bash -c 'cargo build --workspace -q && target/debug/aaf-server ontology lint spec/examples'
        language: system
        files: ^spec/examples/
        pass_filenames: false
