# AAF pre-commit configuration
#
# Mirrors the CI jobs in .github/workflows/ci.yml so that issues are
# caught locally before they reach GitHub Actions.
#
# Install:
#   pip install pre-commit
#   pre-commit install
#   pre-commit install --hook-type pre-push
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Skip hooks for a one-off commit (not recommended):
#   git commit --no-verify

repos:
  # ── General file hygiene ───────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-endings
        args: [--fix=lf]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # ── CI-mirrored checks (same order as .github/workflows/ci.yml) ──
  - repo: local
    hooks:
      # CI job: fmt
      - id: cargo-fmt
        name: "ci: cargo fmt"
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      # CI job: clippy
      - id: cargo-clippy
        name: "ci: cargo clippy"
        entry: make clippy
        language: system
        types: [rust]
        pass_filenames: false

      # CI job: test (pre-push only — too slow for every commit)
      - id: cargo-test
        name: "ci: cargo test"
        entry: cargo test --workspace
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      # CI job: schema-validate
      - id: schema-validate
        name: "ci: schema validate"
        entry: python3 scripts/schema_validate.py --schema-dir spec/schemas --examples-dir spec/examples
        language: system
        files: ^spec/
        pass_filenames: false

      # CI job: build
      - id: cargo-build
        name: "ci: cargo build"
        entry: cargo build --workspace
        language: system
        types: [rust]
        pass_filenames: false

      # CI job: doc
      - id: cargo-doc
        name: "ci: cargo doc"
        entry: bash -c 'RUSTDOCFLAGS="-Dwarnings" cargo doc --workspace --no-deps'
        language: system
        types: [rust]
        pass_filenames: false
