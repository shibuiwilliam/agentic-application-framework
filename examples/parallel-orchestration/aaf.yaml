project:
  name: parallel-orchestration
  version: 0.2.0

budget:
  max_tokens: 8000
  max_cost_usd: 1.00
  max_latency_ms: 20000

# Four capabilities forming a diamond-shaped execution graph:
#
#   validate-order (deterministic)
#        |
#   +----+----+----+
#   |         |    |
#   check     verify  validate
#   inventory payment address
#   |         |    |
#   +----+----+----+
#        |
#   confirm-order (deterministic, write)
#
# The three middle capabilities run in parallel via a ForkNode.
capabilities:
  - id: cap-validate-order
    name: validate order
    description: validate order structure and business rules
    domains: [orders]
    required_scope: orders:read
    side_effect: read

  - id: cap-check-inventory
    name: check inventory
    description: verify product availability across warehouses
    domains: [inventory]
    required_scope: inventory:read
    side_effect: read

  - id: cap-verify-payment
    name: verify payment
    description: validate payment method and run fraud checks
    domains: [payments]
    required_scope: payments:read
    side_effect: read

  - id: cap-validate-address
    name: validate address
    description: verify shipping address with postal service
    domains: [shipping]
    required_scope: shipping:read
    side_effect: read

  - id: cap-confirm-order
    name: confirm order
    description: finalize the order after all checks pass
    domains: [orders]
    required_scope: orders:write
    side_effect: write

demo:
  goal: show order processing analysis
  domain: orders
  role: operator
  scopes:
    - orders:read
    - orders:write
    - inventory:read
    - payments:read
    - shipping:read
