project:
  name: order-saga-demo
  version: 0.2.0

budget:
  max_tokens: 5000
  max_cost_usd: 1.0
  max_latency_ms: 30000

capabilities:
  - id: cap-stock-check
    name: stock check
    description: check inventory stock for a product
    domains: [ecommerce]
    required_scope: inventory:read

  - id: cap-payment-execute
    name: payment execute
    description: execute payment for an order
    domains: [ecommerce]
    required_scope: payment:execute

  - id: cap-shipping-arrange
    name: shipping arrange
    description: arrange shipping delivery for an order
    domains: [ecommerce]
    required_scope: shipping:write

demo:
  goal: "create order for product"
  domain: ecommerce
  role: customer
  scopes:
    - inventory:read
    - payment:execute
    - shipping:write
    - auto-approve
